; PlatformIO Project Configuration File
; Spider Robot - ESP32 Version

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; 시리얼 모니터 속도
monitor_speed = 115200

; 라이브러리 의존성
lib_deps = 
    madhephaestus/ESP32Servo@^1.2.1

; 업로드 속도 (필요시 조정)
upload_speed = 921600

; 파티션 스킴 (기본값 사용)
; board_build.partitions = default.csv